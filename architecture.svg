<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="420" fill="#070d14"/>

  <!-- Azure Region Box -->
  <rect x="30" y="60" width="840" height="300" rx="16" fill="rgba(0,120,212,0.04)" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="8,5"/>

