  <text x="450" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#3a6ea8" letter-spacing="2" font-family="'Courier New', monospace">LAB 01 · AZURE CLOUD SECURITY SERIES</text>

  <!-- ── NODE 1: End User ── -->
